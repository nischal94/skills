name: actionlint

# Static analysis for GitHub Actions workflow YAML. Catches typos in
# expressions, undefined contexts, unsafe shell patterns, and broken
# `if:` conditions BEFORE they fail at runtime in some unlucky branch.
#
# Only runs when workflow files themselves change — nothing to lint
# otherwise.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color
